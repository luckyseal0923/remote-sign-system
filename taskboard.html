<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esign 任務狀態看板 Demo</title>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --line:#e2e8f0;
      --text:#0f172a;
      --sub:#64748b;
      --primary:#2563eb;
      --primary-soft:#dbeafe;
      --success:#16a34a;
      --success-soft:#dcfce7;
      --warning:#d97706;
      --warning-soft:#fef3c7;
      --danger:#dc2626;
      --danger-soft:#fee2e2;
      --gray:#475569;
      --gray-soft:#e2e8f0;
      --shadow:0 10px 30px rgba(15,23,42,0.08);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:"Noto Sans TC","Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .layout{
      min-height:100vh;
    }

    .main{
      padding:24px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .page-title{
      font-size:28px;
      font-weight:800;
      margin:0 0 8px;
    }

    .page-sub{
      color:var(--sub);
      font-size:14px;
      line-height:1.7;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:10px 14px;
      border-radius:10px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }

    .btn.primary{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .btn:hover{
      border-color:var(--primary);
      color:var(--primary);
    }

    .btn.primary:hover{
      color:#fff;
      opacity:.95;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(180px, 1fr));
      gap:16px;
      margin-bottom:22px;
    }

    .summary-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .summary-label{
      color:var(--sub);
      font-size:13px;
      margin-bottom:10px;
    }

    .summary-value{
      font-size:30px;
      font-weight:800;
      line-height:1;
      margin-bottom:8px;
    }

    .summary-note{
      font-size:12px;
      color:var(--sub);
      line-height:1.6;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:20px;
    }

    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .panel-title{
      font-size:18px;
      font-weight:800;
      margin:0;
    }

    .filters{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .input,
    .select,
    .auth-field input{
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
    }

    .input,
    .select{
      min-width:150px;
    }

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:980px;
    }

    th,td{
      padding:14px 12px;
      border-bottom:1px solid #edf2f7;
      text-align:left;
      vertical-align:middle;
      font-size:14px;
    }

    th{
      color:var(--sub);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.05em;
      background:#f8fafc;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:#fcfdff;
    }

    .case-code{
      font-weight:800;
      color:#0f172a;
      margin-bottom:4px;
    }

    .case-name{
      color:var(--sub);
      font-size:13px;
      line-height:1.5;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .pill.created{ background:var(--primary-soft); color:var(--primary); }
    .pill.signing{ background:var(--warning-soft); color:var(--warning); }
    .pill.done{ background:var(--success-soft); color:var(--success); }
    .pill.cancel{ background:var(--danger-soft); color:var(--danger); }
    .pill.pending{ background:#f1f5f9; color:#475569; }

    .progress-box{
      min-width:180px;
    }

    .progress-top{
      display:flex;
      justify-content:space-between;
      gap:8px;
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
    }

    .progress-bar{
      width:100%;
      height:10px;
      background:#e2e8f0;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      background:linear-gradient(90deg, #2563eb, #16a34a);
      border-radius:999px;
    }

    .row-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .mini-btn{
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      border-radius:8px;
      padding:7px 10px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }

    .mini-btn:hover{
      border-color:var(--primary);
      color:var(--primary);
    }

    .mini-btn.primary-action{
      border-color:var(--primary);
      color:var(--primary);
      background:var(--primary-soft);
    }

    .child-row{
      background:#fafcff;
    }

    .child-wrap{
      padding:14px 0 6px;
    }

    .child-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(220px, 1fr));
      gap:12px;
    }

    .child-card{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:14px;
    }

    .child-code{
      font-size:13px;
      font-weight:800;
      margin-bottom:6px;
    }

    .child-meta{
      font-size:12px;
      color:var(--sub);
      line-height:1.7;
      margin-bottom:10px;
    }

    .child-url{
      font-size:12px;
      color:var(--primary);
      word-break:break-all;
      background:#f8fafc;
      border-radius:8px;
      padding:8px;
      margin-top:8px;
    }

    .empty{
      text-align:center;
      color:var(--sub);
      padding:30px 10px;
      font-size:14px;
    }

    .auth-overlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:999;
    }

    .auth-overlay.show{
      display:flex;
    }

    .auth-modal{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:20px;
      border:1px solid var(--line);
    }

    .auth-modal-title{
      font-size:20px;
      font-weight:800;
      margin:0 0 8px;
    }

    .auth-modal-sub{
      font-size:13px;
      color:var(--sub);
      line-height:1.7;
      margin-bottom:16px;
    }

    .auth-form{
      display:grid;
      gap:12px;
    }

    .auth-field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .auth-field label{
      font-size:12px;
      font-weight:700;
      color:var(--sub);
    }

    .auth-actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .auth-message{
      display:none;
      margin-top:12px;
      border-radius:10px;
      padding:10px 12px;
      font-size:13px;
      line-height:1.6;
      background:var(--danger-soft);
      color:var(--danger);
    }

    .auth-message.show{
      display:block;
    }

    @media (max-width: 1200px){
      .summary-grid{
        grid-template-columns:repeat(2, minmax(180px, 1fr));
      }
    }

    @media (max-width: 900px){
      .main{
        padding:16px;
      }
      .main{
        padding:16px;
      }
      .summary-grid,
      .child-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <main class="main">
      <div class="topbar">
        <div>
          <h1 class="page-title">E-Sign 遠端簽核管理系統</h1>
          <div class="page-sub">
            協助使用者集中管理遠端簽核案件，支援案件建立後之進度追蹤、簽署狀態檢視、子任務管理與權限驗證操作，提升電子簽核作業效率與管理便利性。
          </div>
        </div>
      </div>

      <section class="summary-grid" id="summaryGrid"></section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">案件列表</h2>
          <div class="filters">
            <input id="searchInput" class="input" type="text" placeholder="搜尋案件編號 / 案件名稱 / 起單人">
            <select id="statusFilter" class="select">
              <option value="">全部狀態</option>
              <option value="已建立">已建立</option>
              <option value="簽署中">簽署中</option>
              <option value="簽署完成">簽署完成</option>
              <option value="已結案">已結案</option>
              <option value="已作廢">已作廢</option>
            </select>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>案件資訊</th>
                <th>起單人</th>
                <th>建立時間</th>
                <th>狀態</th>
                <th>簽署進度</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="caseTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="auth-overlay" id="authOverlay">
    <div class="auth-modal">
      <h3 class="auth-modal-title">驗證登入</h3>
      <div class="auth-modal-sub">
        請輸入該案件對應的員編、生日與密碼，驗證成功後才會開啟該案件操作功能。
      </div>

      <div class="auth-form">
        <div class="auth-field">
          <label for="authStaffId">員編</label>
          <input id="authStaffId" type="text" placeholder="請輸入員編">
        </div>
        <div class="auth-field">
          <label for="authBirth">生日</label>
          <input id="authBirth" type="text" placeholder="例如：19850923">
        </div>
        <div class="auth-field">
          <label for="authPassword">密碼</label>
          <input id="authPassword" type="password" placeholder="請輸入密碼">
        </div>
      </div>

      <div id="authMessage" class="auth-message"></div>

      <div class="auth-actions">
        <button class="btn" type="button" onclick="closeAuthModal()">取消</button>
        <button class="btn primary" type="button" onclick="submitAuth()">登入驗證</button>
      </div>
    </div>
  </div>

        ]

    const summaryGrid = document.getElementById('summaryGrid');
    const caseTableBody = document.getElementById('caseTableBody');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const authOverlay = document.getElementById('authOverlay');
    const authStaffId = document.getElementById('authStaffId');
    const authBirth = document.getElementById('authBirth');
    const authPassword = document.getElementById('authPassword');
    const authMessage = document.getElementById('authMessage');

    const DEFAULT_AUTH_STAFF_ID = '104114';
    const DEFAULT_AUTH_BIRTH = '19850923';
    const DEFAULT_AUTH_PASSWORD = '84384131';

    const verifiedCaseIds = new Set();
    let activeAuthCaseId = '';

    function getDoneCount(item){
      return item.childTasks.filter(x => x.status === '已完成').length;
    }

    function getPendingCount(item){
      return item.childTasks.filter(x => x.status !== '已完成').length;
    }

    function getProgress(item){
      if(!item.signCount) return 0;
      return Math.round((getDoneCount(item) / item.signCount) * 100);
    }

    function getStatusClass(status){
      if(status === '已建立') return 'created';
      if(status === '簽署中') return 'signing';
      if(status === '已完成' || status === '簽署完成' || status === '已結案') return 'done';
      if(status === '已作廢') return 'cancel';
      return 'pending';
    }

    function formatDateDisplay(value){
      if(!value) return '—';
      return String(value).replace(/-/g, '/');
    }

    function getDisplayStatus(item){
      const progress = getProgress(item);
      if (item.status === '簽署中' && progress === 100) return '已結案';
      if (item.status === '簽署完成') return '簽署完成';
      if (item.status === '已完成') return '已結案';
      return item.status;
    }

    function getCaseAuthConfig(item){
      return {
        staffId: item.staffId || DEFAULT_AUTH_STAFF_ID,
        birth: item.birthDate || DEFAULT_AUTH_BIRTH,
        password: item.password || DEFAULT_AUTH_PASSWORD
      };
    }

    function isCaseVerified(caseId){
      return verifiedCaseIds.has(caseId);
    }

    function getActionButtons(item, index){
      if (!isCaseVerified(item.caseId)) {
        return `<button class="mini-btn primary-action" onclick="openAuthModal('${item.caseId}')">驗證登入</button>`;
      }

      return `
        <button class="mini-btn" onclick="toggleChildren(${index}, '${item.caseId}')">展開子任務</button>
        <button class="mini-btn">結案</button>
        <button class="mini-btn">刪除</button>
      `;
    }

    function renderSummary(list){
      const totalCases = list.length;
      const totalChild = list.reduce((sum, item) => sum + item.childTasks.length, 0);
      const totalDone = list.reduce((sum, item) => sum + getDoneCount(item), 0);
      const totalPending = totalChild - totalDone;
      const completedCases = list.filter(x => ['簽署完成', '已結案'].includes(getDisplayStatus(x))).length;

      const cards = [
        {
          label: '總案件數',
          value: totalCases,
          note: '主案件總量，供主管掌握當日或當期電子簽署工作量。'
        },
        {
          label: '總簽署份數',
          value: totalChild,
          note: '所有子任務加總，每一份都對應一組獨立 URL 與子編號。'
        },
        {
          label: '已完成簽署',
          value: totalDone,
          note: `完成率 ${totalChild ? Math.round(totalDone / totalChild * 100) : 0}%`
        },
        {
          label: '已完成案件',
          value: completedCases,
          note: `尚有 ${totalPending} 份待簽或異常需追蹤`
        }
      ];

      summaryGrid.innerHTML = cards.map(card => `
        <div class="summary-card">
          <div class="summary-label">${card.label}</div>
          <div class="summary-value">${card.value}</div>
          <div class="summary-note">${card.note}</div>
        </div>
      `).join('');
    }

    function renderCases(list){
      if(!list.length){
        caseTableBody.innerHTML = `
          <tr>
            <td colspan="6">
              <div class="empty">查無符合條件的案件。</div>
            </td>
          </tr>
        `;
        return;
      }

      caseTableBody.innerHTML = list.map((item, index) => {
        const done = getDoneCount(item);
        const pending = getPendingCount(item);
        const progress = getProgress(item);

        return `
          <tr>
            <td>
              <div class="case-code">${item.caseId}</div>
              <div class="case-name">${item.caseName}</div>
            </td>
            <td>
              <strong>${item.applicantName}</strong>
            </td>
            <td>${formatDateDisplay(item.createdAt)}</td>
            <td><span class="pill ${getStatusClass(getDisplayStatus(item))}">${getDisplayStatus(item)}</span></td>
            <td>
              <div class="progress-box">
                <div class="progress-top">
                  <span>已簽 ${done}</span>
                  <span>待簽 ${pending}</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${progress}%"></div>
                </div>
              </div>
            </td>
            <td>
              <div class="row-actions">
                ${getActionButtons(item, index)}
              </div>
            </td>
          </tr>
          <tr id="child-row-${item.caseId}" class="child-row" style="display:none;">
            <td colspan="6">
              <div class="child-wrap">
                <div class="child-grid">
                  ${item.childTasks.map(task => `
                    <div class="child-card">
                      <div class="child-code">${task.signId}</div>
                      <div style="margin-bottom:8px;">
                        <span class="pill ${task.status === '已完成' ? 'done' : 'pending'}">${task.status}</span>
                      </div>
                      <div class="child-meta">
                        主案件：${item.caseId}<br>
                        簽署時間：${task.signedAt ? formatDateDisplay(task.signedAt) : '尚未簽署'}
                      </div>
                      <div class="row-actions">
                        <button class="mini-btn">複製連結</button>
                        <button class="mini-btn">下載</button>
                      </div>
                      <div class="child-url">${task.signUrl}</div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function filterCases(){
      const keyword = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;

      const filtered = demoCases.filter(item => {
        const matchKeyword =
          !keyword ||
          item.caseId.toLowerCase().includes(keyword) ||
          item.caseName.toLowerCase().includes(keyword) ||
          item.applicantName.toLowerCase().includes(keyword);

        const matchStatus = !status || getDisplayStatus(item) === status;

        return matchKeyword && matchStatus;
      });

      renderSummary(filtered);
      renderCases(filtered);
    }

    function toggleChildren(index, caseId){
      const item = demoCases[index];
      if (!item || item.caseId !== caseId || !isCaseVerified(caseId)) {
        openAuthModal(caseId);
        return;
      }

      const row = document.getElementById(`child-row-${caseId}`);
      if(!row) return;
      row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
    }

    function openAuthModal(caseId){
      activeAuthCaseId = caseId || '';
      authOverlay.classList.add('show');
      authMessage.className = 'auth-message';
      authMessage.textContent = '';
      authStaffId.value = '';
      authBirth.value = '';
      authPassword.value = '';
      authStaffId.focus();
    }

    function closeAuthModal(){
      authOverlay.classList.remove('show');
      activeAuthCaseId = '';
    }

    function submitAuth(){
      const staffId = authStaffId.value.trim();
      const birth = authBirth.value.trim();
      const password = authPassword.value.trim();

      if (!staffId || !birth || !password) {
        authMessage.textContent = '請完整輸入員編、生日與密碼。';
        authMessage.className = 'auth-message show';
        return;
      }

      const targetCase = demoCases.find(item => item.caseId === activeAuthCaseId);
      const authConfig = targetCase ? getCaseAuthConfig(targetCase) : null;

      if (authConfig && staffId === authConfig.staffId && birth === authConfig.birth && password === authConfig.password) {
        verifiedCaseIds.add(activeAuthCaseId);
        closeAuthModal();
        filterCases();
        return;
      }

      authMessage.textContent = '驗證失敗，請確認輸入資料是否正確。';
      authMessage.className = 'auth-message show';
    }

    function runInlineTests(){
      console.assert(isCaseVerified('not-exist') === false, '未驗證案件應為 false');
      const authConfig = getCaseAuthConfig(demoCases[0]);
      console.assert(authConfig.staffId === '104114', '員編預設值應正確');
      console.assert(authConfig.birth === '19850923', '生日預設值應正確');
      console.assert(authConfig.password === '84384131', '密碼預設值應正確');
      console.assert(getDoneCount(demoCases[0]) === 2, '第一筆已完成數應為 2');
      console.assert(getPendingCount(demoCases[0]) === 3, '第一筆待簽數應為 3');
    }

    window.toggleChildren = toggleChildren;
    window.openAuthModal = openAuthModal;
    window.closeAuthModal = closeAuthModal;
    window.submitAuth = submitAuth;
    window.filterCases = filterCases;

    searchInput.addEventListener('input', filterCases);
    statusFilter.addEventListener('change', filterCases);
    authOverlay.addEventListener('click', (event) => {
      if (event.target === authOverlay) {
        closeAuthModal();
      }
    });

    runInlineTests();
    renderSummary(demoCases);
    renderCases(demoCases);
  </script>
</body>
</html>
