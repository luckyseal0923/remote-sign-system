<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>遠端簽名系統 - 起單人作業版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --sig-color: #ef4444;
      --txt-color: #0ea5e9;
      --prefill-color: #10b981;
      --bg-slate: #f8fafc;
    }
    
    * { box-sizing: border-box; outline: none; }
    body { 
      margin: 0; 
      font-family: "Inter", "Noto Sans TC", sans-serif; 
      background: #e2e8f0; 
      display: flex; 
      height: 100vh; 
      overflow: hidden;
    }

    /* 側邊欄 */
    .sidebar { 
      width: 400px; 
      background: white; 
      border-right: 1px solid #cbd5e1; 
      display: flex; 
      flex-direction: column; 
      z-index: 100;
      box-shadow: 4px 0 15px rgba(0,0,0,0.05);
    }
    
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #f1f5f9;
      background: var(--bg-slate);
    }
    
    .sidebar-header h1 {
      font-size: 18px;
      margin: 0;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-content { padding: 20px; overflow-y: auto; flex: 1; }
    
    .card { 
      background: #fff; 
      border: 1px solid #e2e8f0; 
      border-radius: 12px; 
      padding: 16px; 
      margin-bottom: 20px; 
    }
    
    h2 { 
      font-size: 14px; 
      margin: 0 0 15px; 
      color: #64748b; 
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn { 
      width: 100%; 
      border: 0; 
      border-radius: 8px; 
      padding: 10px 16px; 
      font-size: 14px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s; 
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    
    .btn-outline { 
      background: white; 
      border: 1px solid #cbd5e1; 
      color: #475569; 
    }
    .btn-outline:hover { 
      background: var(--bg-slate); 
      border-color: var(--primary); 
      color: var(--primary);
    }
    
    .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fecaca; }

    /* 清單樣式 */
    .field-item { 
      border: 1px solid #e2e8f0; 
      border-radius: 8px; 
      padding: 12px; 
      margin-bottom: 10px; 
      background: #fff; 
      transition: all 0.2s;
    }
    .field-item.active { 
      border-color: var(--primary); 
      background: #eff6ff; 
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .field-item label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 6px; color: #94a3b8; }
    .field-item input { 
      width: 100%; 
      padding: 8px 10px; 
      border: 1px solid #d1d5db; 
      border-radius: 6px; 
      font-size: 13px; 
    }

    /* PDF 區域 */
    .viewer { 
      flex: 1; 
      background: #334155; 
      padding: 40px; 
      overflow: auto; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      position: relative;
    }
    
    .stage-wrap { 
      position: relative; 
      background: white; 
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
    }
    
    #pdfCanvas { display: block; }
    .overlay { position: absolute; inset: 0; pointer-events: none; }
    
    /* 框框樣式 */
    .box { 
      position: absolute; 
      pointer-events: auto; 
      cursor: grab;
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(2px);
      user-select: none;
      touch-action: none;
    }
    .box:active { cursor: grabbing; }
    .box.active { 
      outline: 2px solid var(--primary); 
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
      z-index: 50;
    }
    
    .type-sig { border: 2px dashed var(--sig-color); color: var(--sig-color); }
    .type-txt { border: 2px dashed var(--txt-color); color: var(--txt-color); }
    .type-pre { border: 2px solid var(--prefill-color); background: rgba(16, 185, 129, 0.1); color: #065f46; }
    
    .box-num { 
      position: absolute; 
      top: -12px; 
      left: -12px; 
      background: #1e293b; 
      color: white; 
      font-size: 10px; 
      width: 22px; 
      height: 22px; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border: 2px solid white; 
      font-weight: bold;
    }
    
    .box-content { 
      font-size: 12px; 
      text-align: center; 
      width: 100%; 
      padding: 5px; 
      overflow: hidden; 
      white-space: nowrap; 
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .del-icon { 
      position: absolute; 
      top: -12px; 
      right: -12px; 
      background: #ef4444; 
      color: white; 
      width: 22px; 
      height: 22px; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer; 
      border: 2px solid white; 
      font-size: 14px; 
      opacity: 0;
      transition: opacity 0.2s;
    }
    .box:hover .del-icon { opacity: 1; }

    .page-nav { 
      background: rgba(255,255,255,0.9); 
      backdrop-filter: blur(10px);
      padding: 10px 25px; 
      border-radius: 50px; 
      margin-bottom: 30px; 
      display: flex; 
      gap: 20px; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 1000; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
    }
    
    .nav-btn {
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: #f1f5f9; border-color: var(--primary); color: var(--primary); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* 自定義彈窗 */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      z-index: 9999;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .resize-handle {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 15px;
      height: 15px;
      background: var(--primary);
      cursor: nwse-resize;
      border-radius: 2px 0 0 0;
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>📄 遠端簽名佈局系統</h1>
  </div>
  
  <div class="sidebar-content">
    <div class="card">
      <h2>1. 文件管理</h2>
      <input type="file" id="pdfFile" accept="application/pdf" style="display:none">
      <button class="btn btn-primary" onclick="document.getElementById('pdfFile').click()">
        📁 選擇 PDF 文件
      </button>
      <div id="fileName" style="margin-top: 10px; font-size: 12px; color: #64748b; text-align: center;">尚未選擇檔案</div>
    </div>

    <div class="card">
      <h2>2. 起單人預填 <small>(您現在填寫)</small></h2>
      <button class="btn btn-outline" id="addPrefill">＋ 新增預填文字框</button>
      <div id="prefillList" style="margin-top: 10px;"></div>
    </div>

    <div class="card">
      <h2>3. 簽署人欄位 <small>(發送後由對方填寫)</small></h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn btn-outline" id="addSig">✒️ 簽名框</button>
        <button class="btn btn-outline" id="addTxt">🔤 文字框</button>
      </div>
      <div id="signList" style="margin-top: 10px;"></div>
    </div>
    
    <div class="card" style="border-top: 4px solid var(--primary);">
      <h2>4. 範本操作</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn btn-outline" onclick="exportJSON()">💾 導出範本</button>
        <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📂 導入範本</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this.files[0])">
    </div>
  </div>
</aside>

<main class="viewer">
  <div class="page-nav" id="navUi" style="display:none;">
    <button id="prev" class="nav-btn">＜</button>
    <span id="pageInfo" style="font-weight: bold; min-width: 60px; text-align: center;">1 / 1</span>
    <button id="next" class="nav-btn">＞</button>
  </div>
  
  <div class="stage-wrap" id="stageWrap">
    <canvas id="pdfCanvas"></canvas>
    <div class="overlay" id="overlay"></div>
  </div>
</main>

<div id="toast">訊息已更新</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

/* =========================
   全域狀態
========================= */
let pdfDoc = null;
let currPage = 1;
let fields = [];
let selectedId = null;

const canvas = document.getElementById('pdfCanvas');
const overlay = document.getElementById('overlay');
const stageWrap = document.getElementById('stageWrap');
const prefillList = document.getElementById('prefillList');
const signList = document.getElementById('signList');

/* =========================
   核心功能：PDF 載入與渲染
========================= */
document.getElementById('pdfFile').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  
  document.getElementById('fileName').textContent = file.name;
  const buffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: buffer }).promise;
  
  document.getElementById('navUi').style.display = 'flex';
  renderPage(1);
  showToast("PDF 載入成功");
};

async function renderPage(num) {
  currPage = num;
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: 1.5 });
  const ctx = canvas.getContext('2d');

  canvas.width = viewport.width;
  canvas.height = viewport.height;

  await page.render({ canvasContext: ctx, viewport }).promise;

  stageWrap.style.width = viewport.width + 'px';
  overlay.style.width = viewport.width + 'px';
  overlay.style.height = viewport.height + 'px';

  document.getElementById('pageInfo').textContent = `${num} / ${pdfDoc.numPages}`;
  document.getElementById('prev').disabled = (num <= 1);
  document.getElementById('next').disabled = (num >= pdfDoc.numPages);

  renderUI();
}

/* =========================
   欄位操作
========================= */
function addField(type) {
  if(!pdfDoc) {
    showToast("請先上傳 PDF 文件");
    return;
  }

  const id = crypto.randomUUID();
  fields.push({
    id,
    type,
    page: currPage,
    x: 50,
    y: 50,
    w: 150,
    h: 50,
    content: type === "sig" ? "簽署人簽名" : (type === "txt" ? "簽署人應填文字" : "您的預填文字")
  });

  selectedId = id;
  renderUI();
}

function renderUI() {
  overlay.innerHTML = '';
  prefillList.innerHTML = '';
  signList.innerHTML = '';

  fields.forEach((f, i) => {
    const num = i + 1;

    // --- 渲染畫布上的框框 ---
    if(f.page === currPage) {
      const box = document.createElement('div');
      box.className = `box type-${f.type} ${f.id === selectedId ? 'active' : ''}`;
      box.style.left = f.x + 'px';
      box.style.top = f.y + 'px';
      box.style.width = f.w + 'px';
      box.style.height = f.h + 'px';
      box.dataset.id = f.id;

      box.innerHTML = `
        <span class="box-num">${num}</span>
        <div class="box-content">${f.content}</div>
        <div class="del-icon">✕</div>
        <div class="resize-handle"></div>
      `;

      overlay.appendChild(box);

      // 事件綁定
      bindBoxEvents(box, f);
      box.querySelector('.del-icon').onclick = (e) => {
        e.stopPropagation();
        removeField(f.id);
      };
    }

    // --- 渲染側邊欄清單 ---
    const item = document.createElement('div');
    item.className = `field-item ${f.id === selectedId ? 'active' : ''}`;
    
    const typeLabel = f.type === "prefill" ? "預填文字" : (f.type === "sig" ? "簽名框" : "文字框");
    
    item.innerHTML = `
      <label>[${num}] ${typeLabel} - 第 ${f.page} 頁</label>
      <input type="text" value="${f.content}" placeholder="輸入提示文字...">
    `;

    const input = item.querySelector('input');
    input.onfocus = () => { 
      if(selectedId !== f.id) {
        selectedId = f.id;
        renderUI();
      }
    };
    input.oninput = (e) => {
      f.content = e.target.value;
      const boxContent = document.querySelector(`[data-id="${f.id}"] .box-content`);
      if(boxContent) boxContent.textContent = f.content;
    };

    if(f.type === "prefill") prefillList.appendChild(item);
    else signList.appendChild(item);
  });
}

function bindBoxEvents(box, f) {
  // 點擊選中
  box.onmousedown = (e) => {
    if(e.target.classList.contains('resize-handle')) return;
    selectedId = f.id;
    renderUI();
    
    const container = stageWrap.getBoundingClientRect();
    const offsetX = e.clientX - box.getBoundingClientRect().left;
    const offsetY = e.clientY - box.getBoundingClientRect().top;

    const onMove = (me) => {
      let nx = me.clientX - container.left - offsetX;
      let ny = me.clientY - container.top - offsetY;
      
      // 邊界限制
      nx = Math.max(0, Math.min(nx, container.width - f.w));
      ny = Math.max(0, Math.min(ny, container.height - f.h));

      f.x = nx; f.y = ny;
      box.style.left = nx + 'px';
      box.style.top = ny + 'px';
    };

    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  // 縮放功能
  const resizeHandle = box.querySelector('.resize-handle');
  resizeHandle.onmousedown = (e) => {
    e.stopPropagation();
    const startW = f.w;
    const startH = f.h;
    const startX = e.clientX;
    const startY = e.clientY;

    const onMove = (me) => {
      f.w = Math.max(60, startW + (me.clientX - startX));
      f.h = Math.max(30, startH + (me.clientY - startY));
      box.style.width = f.w + 'px';
      box.style.height = f.h + 'px';
    };

    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      renderUI(); // 重新整理佈局
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  // 支援 Touch 觸控
  box.ontouchstart = (e) => {
    const touch = e.touches[0];
    selectedId = f.id;
    renderUI();
    
    const container = stageWrap.getBoundingClientRect();
    const offsetX = touch.clientX - box.getBoundingClientRect().left;
    const offsetY = touch.clientY - box.getBoundingClientRect().top;

    const onTouchMove = (te) => {
      const t = te.touches[0];
      let nx = t.clientX - container.left - offsetX;
      let ny = t.clientY - container.top - offsetY;
      f.x = nx; f.y = ny;
      box.style.left = nx + 'px';
      box.style.top = ny + 'px';
    };

    box.ontouchmove = onTouchMove;
    box.ontouchend = () => { box.ontouchmove = null; };
  };
}

function removeField(id) {
  fields = fields.filter(f => f.id !== id);
  if(selectedId === id) selectedId = null;
  renderUI();
}

/* =========================
   範本匯出與匯入
========================= */
window.exportJSON = () => {
  if(fields.length === 0) {
    showToast("目前沒有任何欄位可匯出");
    return;
  }
  const data = {
    version: "1.0",
    fields: fields,
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `signature-template-${Date.now()}.json`;
  a.click();
  showToast("範本導出成功");
};

window.importJSON = (file) => {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      fields = data.fields || [];
      renderUI();
      showToast("範本匯入成功");
    } catch (err) {
      showToast("檔案格式錯誤");
    }
  };
  reader.readAsText(file);
};

/* =========================
   UI 輔助
========================= */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('addPrefill').onclick = () => addField('prefill');
document.getElementById('addSig').onclick = () => addField('sig');
document.getElementById('addTxt').onclick = () => addField('txt');

document.getElementById('prev').onclick = () => currPage > 1 && renderPage(currPage - 1);
document.getElementById('next').onclick = () => currPage < pdfDoc.numPages && renderPage(currPage + 1);

</script>

</body>
</html>
